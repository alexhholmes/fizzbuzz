services:
  fizzbuzz:
    build:
      context: .
      target: development
    ports:
      - "3000:3000"
    environment:
      REDIS_HOST: redis
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  migration:
    build:
      context: .
      target: migration
    environment:
      DATABASE_URL: postgres://api:api@postgres/api
      RUST_LOG: sqlx=debug
    depends_on:
      postgres:
        condition: service_healthy
    restart: no

  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_USER: api
      POSTGRES_PASSWORD: api
      POSTGRES_DB: api
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U api" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
